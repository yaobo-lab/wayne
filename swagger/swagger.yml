        name: filter
        description: the labelSelector for list e.g. filter=app=infra-wayne,wayne-app=infra
        type: string
      - in: query
        name: labelSelector
        description: labelSelector, ex. labelSelector=name=test
        type: string
      - in: query
        name: sortby
        description: column sorted by, ex. sortby=-id, '-' representation desc, and
          sortby=id representation asc
        type: string
      - in: path
        name: cluster
        description: the cluster name
        required: true
        type: string
      - in: path
        name: namespace
        description: the namespace name
        required: true
        type: string
      - in: path
        name: kind
        description: the resource kind
        required: true
        type: string
